<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тэмцээнүүд • MLBB Mongolia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html"><img src="assets/logo.png" alt="MLBB Mongolia" class="logo"></a>
            <nav class="main-nav">
                <a href="index.html">Нүүр</a>
                <a href="match-find.html">Дуэл</a>
                <a href="scrims.html">Скрим</a>
                <a href="tournaments.html" class="active">Тэмцээн</a>
                <a href="clans.html">Баг</a>
                <a href="profile.html">Профайл</a>
                <a href="login.html" id="login-link">Нэвтрэх</a>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <h1>🏆 Тэмцээнүүд</h1>
            <div id="admin-create-btn" style="display: none;">
                <button class="btn btn-primary" onclick="window.location.href='create-tournament.html'">+ Шинэ тэмцээн</button>
            </div>
        </div>
        
        <!-- Filters -->
        <div class="card" style="margin: 2rem 0;">
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
                <div style="flex: 1; min-width: 150px;">
                    <select id="status-filter" style="padding: 0.75rem;">
                        <option value="all">Бүгд</option>
                        <option value="registration">Бүртгэл нээлттэй</option>
                        <option value="in_progress">Явагдаж байгаа</option>
                        <option value="completed">Дууссан</option>
                    </select>
                </div>
                <div style="flex: 2; min-width: 200px;">
                    <input type="text" id="search-input" placeholder="Тэмцээн хайх...">
                </div>
                <button id="search-btn" class="btn btn-outline">Хайх</button>
            </div>
        </div>
        
        <!-- Tournaments Grid -->
        <div id="tournaments-grid" class="tournament-grid">
            <p style="text-align: center;">Ачаалж байна...</p>
        </div>
        
        <!-- Pagination -->
        <div id="pagination" style="display: flex; justify-content: center; gap: 1rem; margin: 3rem 0;"></div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentPage = 0;
        let currentLimit = 9;
        let currentStatus = 'all';
        
        updateNavbar();
        
        if (api.isAdmin()) {
            document.getElementById('admin-create-btn').style.display = 'block';
        }
        
        async function loadTournaments() {
            try {
                let url = `/tournaments?limit=${currentLimit}&offset=${currentPage * currentLimit}`;
                if (currentStatus !== 'all') url += `&status=${currentStatus}`;
                
                const response = await fetch(`http://localhost:4000/api${url}`);
                const data = await response.json();
                const tournaments = data.tournaments || data;
                
                const container = document.getElementById('tournaments-grid');
                container.innerHTML = '';
                
                if (!tournaments || tournaments.length === 0) {
                    container.innerHTML = '<p style="text-align: center;">Тэмцээн байхгүй байна</p>';
                    return;
                }
                
                tournaments.forEach(t => {
                    const statusText = {
                        'draft': 'Ноорог',
                        'registration': 'Бүртгэл нээлттэй',
                        'in_progress': 'Явагдаж байна',
                        'completed': 'Дууссан',
                        'cancelled': 'Цуцлагдсан'
                    }[t.status] || t.status;
                    
                    const statusClass = {
                        'draft': 'badge-info',
                        'registration': 'badge-success',
                        'in_progress': 'badge-warning',
                        'completed': 'badge-info',
                        'cancelled': 'badge-danger'
                    }[t.status] || 'badge-info';
                    
                    container.innerHTML += `
                        <div class="tournament-card">
                            <div class="tournament-header">
                                <span class="tournament-prize">💰 ${formatNumber(t.prize_pool || 0)} ₮</span>
                            </div>
                            <div class="tournament-body">
                                <h3>${t.name}</h3>
                                <p style="color: var(--text-muted); margin: 0.5rem 0;">${t.tournament_type === 'single_elimination' ? '🏆 Хасагдах' : t.tournament_type === 'double_elimination' ? '🔄 Давхар хасагдах' : '⚡ Бүгдтэй тоглох'}</p>
                                <div style="display: flex; justify-content: space-between; margin: 1rem 0;">
                                    <span>📅 ${new Date(t.start_date).toLocaleDateString('mn-MN')}</span>
                                    <span>👥 ${t.current_teams || 0}/${t.max_teams || 16}</span>
                                </div>
                                <span class="badge ${statusClass}">${statusText}</span>
                                <a href="tournament-detail.html?id=${t.id}" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                                    ${t.status === 'registration' ? '📝 Бүртгүүлэх' : '👁️ Дэлгэрэнгүй'}
                                </a>
                            </div>
                        </div>
                    `;
                });
                
                // Pagination
                const totalPages = Math.ceil((data.pagination?.total || tournaments.length) / currentLimit);
                const paginationDiv = document.getElementById('pagination');
                paginationDiv.innerHTML = '';
                
                if (totalPages > 1) {
                    if (currentPage > 0) {
                        paginationDiv.innerHTML += `<button onclick="goToPage(${currentPage - 1})" class="btn btn-outline">◀ Өмнөх</button>`;
                    }
                    paginationDiv.innerHTML += `<span style="padding: 0.5rem 1rem;">${currentPage + 1} / ${totalPages}</span>`;
                    if (currentPage < totalPages - 1) {
                        paginationDiv.innerHTML += `<button onclick="goToPage(${currentPage + 1})" class="btn btn-outline">Дараах ▶</button>`;
                    }
                }
            } catch (err) {
                console.error('Failed to load tournaments:', err);
                document.getElementById('tournaments-grid').innerHTML = '<p style="text-align: center;">Ачаалахад алдаа гарлаа</p>';
            }
        }
        
        function goToPage(page) {
            currentPage = page;
            loadTournaments();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        document.getElementById('status-filter').addEventListener('change', (e) => {
            currentStatus = e.target.value;
            currentPage = 0;
            loadTournaments();
        });
        
        document.getElementById('search-btn').addEventListener('click', () => {
            const search = document.getElementById('search-input').value;
            // Implement search
            currentPage = 0;
            loadTournaments();
        });
        
        loadTournaments();
    </script>
</body>
</html>
