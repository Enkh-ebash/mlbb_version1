<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх • MLBB Mongolia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html"><img src="assets/logo.png" alt="MLBB Mongolia" class="logo"></a>
            <nav class="main-nav">
                <a href="index.html">Нүүр</a>
                <a href="match-find.html">Дуэл</a>
                <a href="scrims.html">Скрим</a>
                <a href="tournaments.html">Тэмцээн</a>
                <a href="clans.html">Баг</a>
                <a href="profile.html">Профайл</a>
                <a href="login.html" class="active">Нэвтрэх</a>
            </nav>
        </div>
    </header>

    <div class="container" style="max-width: 500px; margin: 4rem auto;">
        <div class="card" style="padding: 2.5rem;">
            <h1 style="text-align: center;">Нэвтрэх</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">MLBB Mongolia платформд тавтай морил</p>
            
            <form id="login-form">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Хэрэглэгчийн нэр" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Нууц үг" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Нэвтрэх</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Бүртгэлгүй юу? <a href="register.html" style="color: var(--primary);">Бүртгүүлэх</a>
            </p>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showToast('Хэрэглэгчийн нэр болон нууц үгээ оруулна уу', 'error');
                return;
            }
            
            try {
                const result = await api.login(username, password);
                if (result.success) {
                    showToast('Амжилттай нэвтэрлээ!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showToast(result.error || 'Нэвтрэхэд алдаа гарлаа', 'error');
                }
            } catch (err) {
                showToast('Сервертэй холбогдож чадсангүй', 'error');
            }
        });
        
        // Redirect if already logged in
        if (api.isAuthenticated()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
