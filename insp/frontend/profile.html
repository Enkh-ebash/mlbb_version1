<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профайл • MLBB Mongolia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html"><img src="assets/logo.png" alt="MLBB Mongolia" class="logo"></a>
            <nav class="main-nav">
                <a href="index.html">Нүүр</a>
                <a href="match-find.html">Дуэл</a>
                <a href="scrims.html">Скрим</a>
                <a href="tournaments.html">Тэмцээн</a>
                <a href="clans.html">Баг</a>
                <a href="profile.html" class="active">Профайл</a>
                <a href="#" onclick="api.logout()">Гарах</a>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 2rem;">
        <div id="profile-content">
            <p style="text-align: center;">Ачаалж байна...</p>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!checkAuth()) {
            window.location.href = 'login.html';
        }
        
        const user = getCurrentUser();
        updateNavbar();
        
        async function loadProfile() {
            try {
                const profile = await api.getUserProfile(user.id);
                
                const content = document.getElementById('profile-content');
                content.innerHTML = `
                    <div class="card" style="padding: 2rem;">
                        <div style="display: flex; gap: 2rem; align-items: center; flex-wrap: wrap;">
                            <div style="position: relative;">
                                <img src="https://ui-avatars.com/api/?background=a855f7&color=fff&bold=true&size=150&name=${user.username}" style="width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--primary);">
                                <button onclick="changeAvatar()" style="position: absolute; bottom: 5px; right: 5px; background: var(--primary); border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 1rem;">✏️</button>
                            </div>
                            <div>
                                <h1>${user.username}</h1>
                                <p style="color: var(--text-muted);">${profile.bio || 'Танилцуулга байхгүй'}</p>
                                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem;">
                                    <span class="badge badge-info">🎮 ${profile.mlbb_id || 'MLBB ID байхгүй'}</span>
                                    <span class="badge badge-info">📞 ${profile.phone || 'Утас байхгүй'}</span>
                                    <span class="badge badge-info">📧 ${profile.email || 'И-мэйл байхгүй'}</span>
                                </div>
                                <button onclick="editProfile()" class="btn btn-outline" style="margin-top: 1rem;">Профайл засах</button>
                            </div>
                        </div>
                        
                        <div class="stats-grid" style="margin: 2rem 0;">
                            <div class="stat-card">
                                <div class="stat-value">${formatNumber(user.ignot || 0)}</div>
                                <div class="stat-label">Ignot</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${user.mmr || 1200}</div>
                                <div class="stat-label">MMR</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${profile.stats?.win_rate || 0}%</div>
                                <div class="stat-label">Ялалт %</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${profile.stats?.mvp_count || 0}</div>
                                <div class="stat-label">MVP</div>
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                            <button class="btn btn-outline" onclick="showTab('stats')">📊 Статистик</button>
                            <button class="btn btn-outline" onclick="showTab('matches')">🎮 Матчууд</button>
                            <button class="btn btn-outline" onclick="showTab('teams')">👥 Баг</button>
                        </div>
                        
                        <div id="stats-tab">
                            <h2>📊 Дэлгэрэнгүй статистик</h2>
                            <div class="stats-grid">
                                <div class="stat-card"><div class="stat-value">${profile.stats?.matches_played || 0}</div><div class="stat-label">Тоглолт</div></div>
                                <div class="stat-card"><div class="stat-value">${profile.stats?.wins || 0}</div><div class="stat-label">Ялалт</div></div>
                                <div class="stat-card"><div class="stat-value">${profile.stats?.losses || 0}</div><div class="stat-label">Ялагдал</div></div>
                                <div class="stat-card"><div class="stat-value">${profile.stats?.kda || 0}</div><div class="stat-label">KDA</div></div>
                            </div>
                        </div>
                        
                        <div id="matches-tab" style="display: none;">
                            <h2>🎮 Сүүлийн матчууд</h2>
                            <div id="matches-list"></div>
                        </div>
                        
                        <div id="teams-tab" style="display: none;">
                            <h2>👥 Миний баг</h2>
                            <div id="teams-list"></div>
                        </div>
                    </div>
                `;
                
                // Load match history
                if (user.id) {
                    loadMatchHistory(user.id);
                }
                loadUserTeam();
            } catch (err) {
                console.error('Failed to load profile:', err);
                document.getElementById('profile-content').innerHTML = '<p style="text-align: center;">Ачаалахад алдаа гарлаа</p>';
            }
        }
        
        async function loadMatchHistory(userId) {
            try {
                const container = document.getElementById('matches-list');
                if (!container) return;
                
                container.innerHTML = `
                    <div class="card" style="margin-top: 1rem;">
                        <p style="text-align: center;">Матчийн түүх байхгүй байна</p>
                    </div>
                `;
            } catch (err) {
                console.error('Failed to load match history:', err);
            }
        }
        
        async function loadUserTeam() {
            try {
                const container = document.getElementById('teams-list');
                if (!container) return;
                
                container.innerHTML = `
                    <div class="card" style="margin-top: 1rem;">
                        <p style="text-align: center;">Та багт элсээгүй байна</p>
                        <a href="clans.html" class="btn btn-primary" style="margin-top: 1rem;">Баг хайх</a>
                    </div>
                `;
            } catch (err) {
                console.error('Failed to load team:', err);
            }
        }
        
        function showTab(tab) {
            document.getElementById('stats-tab').style.display = tab === 'stats' ? 'block' : 'none';
            document.getElementById('matches-tab').style.display = tab === 'matches' ? 'block' : 'none';
            document.getElementById('teams-tab').style.display = tab === 'teams' ? 'block' : 'none';
        }
        
        function editProfile() {
            const newBio = prompt('Шинэ танилцуулга:');
            if (newBio !== null) {
                showToast('Профайл шинэчлэгдлээ', 'success');
            }
        }
        
        function changeAvatar() {
            showToast('Avatar солих функц удахгүй', 'info');
        }
        
        loadProfile();
    </script>
</body>
</html>
