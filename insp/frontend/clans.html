<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Багууд • MLBB Mongolia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html"><img src="assets/logo.png" alt="MLBB Mongolia" class="logo"></a>
            <nav class="main-nav">
                <a href="index.html">Нүүр</a>
                <a href="match-find.html">Дуэл</a>
                <a href="scrims.html">Скрим</a>
                <a href="tournaments.html">Тэмцээн</a>
                <a href="clans.html" class="active">Баг</a>
                <a href="profile.html">Профайл</a>
                <a href="login.html" id="login-link">Нэвтрэх</a>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <h1>👥 Багууд</h1>
            <button id="create-team-btn" class="btn btn-primary" style="display: none;">+ Баг үүсгэх</button>
        </div>
        
        <div style="margin: 2rem 0;">
            <div class="card" style="padding: 1rem;">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <input type="text" id="search-team" placeholder="Баг хайх..." style="flex: 1;">
                    <select id="sort-by" style="width: 150px;">
                        <option value="points">Оноогоор</option>
                        <option value="members">Гишүүдээр</option>
                        <option value="newest">Шинээр</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div id="teams-grid" class="tournament-grid">
            <p style="text-align: center;">Ачаалж байна...</p>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        updateNavbar();
        
        const user = getCurrentUser();
        if (user) {
            document.getElementById('create-team-btn').style.display = 'block';
        }
        
        document.getElementById('create-team-btn').addEventListener('click', () => {
            showToast('Баг үүсгэх функц удахгүй нэмэгдэнэ', 'info');
        });
        
        async function loadTeams() {
            try {
                const teams = [
                    { id: 1, name: 'Mongol Warriors', tag: 'MW', members: 28, captain: 'ZolooGOD', points: 1250, rank: 1 },
                    { id: 2, name: 'Dark Wolves', tag: 'DW', members: 24, captain: 'WolfKing', points: 980, rank: 2 },
                    { id: 3, name: 'Steppe Eagles', tag: 'SE', members: 32, captain: 'EagleEye', points: 870, rank: 3 },
                    { id: 4, name: 'Nomad Empire', tag: 'NE', members: 19, captain: 'NomadLeader', points: 650, rank: 4 },
                    { id: 5, name: 'Blue Sky', tag: 'BS', members: 22, captain: 'SkyWalker', points: 540, rank: 5 },
                ];
                
                const container = document.getElementById('teams-grid');
                container.innerHTML = '';
                
                teams.forEach(team => {
                    container.innerHTML += `
                        <div class="card">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div>
                                    <h3>${team.name}</h3>
                                    <p style="color: var(--primary);">[${team.tag}]</p>
                                </div>
                                <span class="badge badge-success">#${team.rank}</span>
                            </div>
                            <div style="margin: 1rem 0;">
                                <p>👥 Гишүүд: ${team.members}</p>
                                <p>👑 Удирдагч: ${team.captain}</p>
                                <p>🏆 Оноо: ${team.points}</p>
                            </div>
                            <button onclick="joinTeam('${team.id}')" class="btn btn-outline" style="width:100%;">Нэгдэх</button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error('Failed to load teams:', err);
                document.getElementById('teams-grid').innerHTML = '<p style="text-align: center;">Ачаалахад алдаа гарлаа</p>';
            }
        }
        
        function joinTeam(teamId) {
            if (!api.isAuthenticated()) {
                showToast('Эхлээд нэвтэрнэ үү', 'error');
                return;
            }
            showToast('Багт нэгдэх хүсэлт илгээгдлээ', 'success');
        }
        
        loadTeams();
    </script>
</body>
</html>
