<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLBB Esports Pro - Competitive Platform</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Rajdhani', sans-serif;
        background: #0a0a0f;
        color: #ffffff;
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      .initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .initial-loader h2 {
        font-family: 'Orbitron', sans-serif;
        color: #8B5CF6;
        font-size: 2rem;
        margin-bottom: 1rem;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1a1a2e;
        border-top-color: #8B5CF6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: #8B5CF6 #1a1a2e;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #1a1a2e;
      }

      ::-webkit-scrollbar-thumb {
        background: #8B5CF6;
        border-radius: 4px;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-B0eIqG9y.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-0e--CoqC.css">
  </head>
  <body>
    <div id="root">
      <div class="initial-loader" id="initial-loader">
        <h2>🎮 MLBB ESPORTS</h2>
        <div class="spinner"></div>
      </div>
    </div>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) loader.classList.add('hidden');
        }, 500);
      });
    </script>
  </body>
</html>
